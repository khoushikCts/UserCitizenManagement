spring.application.name=UserCitizenManagement
server.port=8086
# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/citizenuserdatabase
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Fix
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Use the version-agnostic Dialect for Hibernate 7
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Force Hibernate to use the EXACT names provided in @Table(name="...")
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Force Hibernate to respect the exact names in @Column annotations
jwt.secret=Y2Y4ZTM1YmYtYjYyMC00ZDllLTlhZTMtZDY2ZDU4ZTMxZmE5Cg
# Force Hibernate to use the EXACT names in your @Column annotations

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka: true
eureka.client.fetch-registry: true

# Expose the info and health endpoints to the web
management.endpoints.web.exposure.include=health,info

# Optional: Add custom info that will show up in the Eureka dashboard
info.app.name=User Citizen Management Service
info.app.description=Handles citizen registration and user profiles for Disaster Management
info.app.version=1.0.0
